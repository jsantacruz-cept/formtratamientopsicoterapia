<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Psicoterapia - SRT</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e8edf2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    header {
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #2c3e50; }
    header span { font-size: 12px; color: #7f8c8d; }

    #form-container {
      position: relative;
      width: 660px;
      max-width: 100%;
      background: white;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    #pdf-canvas { display: block; width: 100%; height: auto; }
    #fields-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .field-wrap {
      position: absolute;
      pointer-events: all;
    }
    .field-wrap input[type="text"] {
      width: 100%; height: 100%;
      border: none;
      background: rgba(255,255,210,0.88);
      font-family: Arial, sans-serif;
      color: #1a1a1a;
      padding: 1px 3px;
      outline: none;
    }
    .field-wrap input[type="text"]:focus {
      background: rgba(255,253,180,1);
      box-shadow: 0 0 0 1.5px #3498db inset;
    }
    .field-wrap.checkbox-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .field-wrap.checkbox-wrap input[type="checkbox"] {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      cursor: pointer;
      opacity: 0;
      position: absolute;
    }
    .field-wrap.checkbox-wrap .cb-visual {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: #1a1aaa;
      background: transparent;
      pointer-events: none;
    }
    .field-wrap.checkbox-wrap input:checked ~ .cb-visual {
      background: rgba(200,220,255,0.5);
    }

    /* Firma zone */
    .firma-zone {
      display: flex;
      flex-direction: row;
      background: rgba(255,255,210,0.88);
      border: none;
      overflow: hidden;
      gap: 4px;
      align-items: center;
      padding: 2px 3px;
    }
    .firma-zone:focus-within {
      background: rgba(255,253,180,1);
      box-shadow: 0 0 0 1.5px #3498db inset;
    }
    .firma-text-col {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      justify-content: center;
    }
    .firma-text {
      width: 100%;
      border: none;
      background: transparent;
      font-family: Arial, sans-serif;
      color: #1a1a1a;
      padding: 1px 0;
      outline: none;
    }
    .firma-text::placeholder { color: #aaa; font-style: italic; }
    .firma-img-col {
      flex-shrink: 0;
      width: 90px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #bbb;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.6);
    }
    .firma-img-col img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }
    .firma-img-col .upload-hint {
      font-size: 7.5px;
      color: #888;
      text-align: center;
      pointer-events: none;
      line-height: 1.4;
      padding: 2px;
    }
    .firma-img-col input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }

    #bottom-bar {
      width: 660px; max-width: 100%;
      margin-top: 16px;
      display: flex; gap: 10px; justify-content: flex-end;
    }
    button {
      padding: 10px 22px; border: none; border-radius: 5px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    #btn-clear { background: #ecf0f1; color: #555; }
    #btn-clear:hover { background: #dde1e4; }
    #btn-download { background: #2c6fad; color: white; }
    #btn-download:hover { background: #235a90; }
    #btn-download:disabled { background: #95a5a6; cursor: not-allowed; }
    .tip {
      width: 660px; max-width: 100%;
      margin-top: 10px; font-size: 11.5px; color: #7f8c8d; text-align: center;
    }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 300px; font-size: 14px; color: #555;
    }
  </style>
</head>

pdfjsLib.GlobalWorkerOptions.workerSrc =

let canvasScale = 1;

// Text fields

  { name:"siniestro",      x:388.1, y:112,  w:178, h:13 },

  { name:"cuil",           x:100.5, y:189,  w:360, h:13 },
  { name:"edad",           x:493.4, y:189,  w:74,  h:13 },
  { name:"ocupacion",      x:104.4, y:213,  w:463, h:13 },
  { name:"desc1",          x:53.9,  y:278,  w:515, h:13 },

// Checkboxes — exact coords from PDF rect extraction (x0, top = top-left in PDF top-coords)
// Box size is 7.4 x 7.4 pts each
const CB_SIZE = 7.4;
const CHECKBOXES = [
  // Modalidad
  { name:"mod_presencial", x:63.3,  y:525.9 },
  { name:"mod_virtual",    x:283.9, y:525.9 },
  { name:"mod_mixta",      x:501.7, y:526.6 },
  // Enfoque terapeutico
  { name:"enf_tcc",        x:63.3,  y:565.4 },
  { name:"enf_tcc_trauma", x:63.3,  y:577.2 },
  { name:"enf_exp",        x:63.3,  y:589.0 },
  { name:"enf_tpc",        x:283.9, y:565.4 },
  { name:"enf_emdr",       x:283.9, y:577.2 },
  { name:"enf_act",        x:283.9, y:589.0 },
  { name:"enf_psico",      x:450.6, y:565.4 },
  { name:"enf_otro",       x:450.6, y:577.2 },
  // Bloque terapeutico
  { name:"bloque_8",       x:63.3,  y:624.9 },

  { name:"bloque_16",      x:450.6, y:624.9 },
  // Frecuencia
  { name:"frec_semanal",   x:63.3,  y:667.2 },
  { name:"frec_quincenal", x:275.6, y:667.2 },
  { name:"frec_intensivo", x:430.8, y:667.2 },
];

// Firma zone: text + image side by side
// Position: below the punteado line, right column
// x=302.3, y=706 for text; we'll make the whole zone taller to fit the image
const FIRMA = { x: 210, y: 700, w: 365, h: 32 };
// Image will be rendered inside FIRMA on the right side in the PDF

async function renderPDF() {
  const bytes = Uint8Array.from(atob(PDF_B64), c => c.charCodeAt(0));
  const pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
  const page = await pdfDoc.getPage(1);

  const container = document.getElementById('form-container');
  const cssWidth = container.clientWidth;
  const viewport = page.getViewport({ scale: cssWidth / PT_W });

  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = viewport.width * dpr;
  canvas.height = viewport.height * dpr;
  canvas.style.width = viewport.width + 'px';
  canvas.style.height = viewport.height + 'px';
  ctx.scale(dpr, dpr);

  await page.render({ canvasContext: ctx, viewport }).promise;
  canvasScale = viewport.width / PT_W;

  canvas.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  buildOverlay(viewport.width, viewport.height);
  document.getElementById('fields-overlay').style.display = 'block';
  document.getElementById('btn-download').disabled = false;
}

function p(pt) { return pt * canvasScale; }

function buildOverlay(canvasW, canvasH) {
  const overlay = document.getElementById('fields-overlay');
  overlay.innerHTML = '';
  overlay.style.width = canvasW + 'px';
  overlay.style.height = canvasH + 'px';
  document.getElementById('form-container').style.height = canvasH + 'px';

  // Text fields
  TEXT_FIELDS.forEach(f => {
    const wrap = document.createElement('div');
    wrap.className = 'field-wrap';
    wrap.style.left = p(f.x) + 'px';
    wrap.style.top = p(f.y) + 'px';
    wrap.style.width = p(f.w) + 'px';
    wrap.style.height = p(f.h) + 'px';

    const el = document.createElement('input');
    el.type = 'text';
    el.id = 'field_' + f.name;
    el.autocomplete = 'off';
    el.style.fontSize = p(7.8) + 'px';
    wrap.appendChild(el);
    overlay.appendChild(wrap);
  });

  // Checkboxes — sized and positioned to exactly match the PDF boxes
  CHECKBOXES.forEach(f => {
    const wrap = document.createElement('div');
    wrap.className = 'field-wrap checkbox-wrap';
    wrap.style.left = p(f.x) + 'px';
    wrap.style.top = p(f.y) + 'px';
    wrap.style.width = p(CB_SIZE) + 'px';
    wrap.style.height = p(CB_SIZE) + 'px';

    const el = document.createElement('input');
    el.type = 'checkbox';
    el.id = 'field_' + f.name;

    const visual = document.createElement('div');
    visual.className = 'cb-visual';
    visual.style.fontSize = p(6) + 'px';

    el.addEventListener('change', () => {
      visual.textContent = el.checked ? 'x' : '';
    });

    wrap.appendChild(el);
    wrap.appendChild(visual);
    overlay.appendChild(wrap);
  });

  // Firma zone: row layout — text left, image right
  const firmaWrap = document.createElement('div');
  firmaWrap.className = 'field-wrap firma-zone';
  firmaWrap.style.left   = p(FIRMA.x) + 'px';
  firmaWrap.style.top    = p(FIRMA.y) + 'px';
  firmaWrap.style.width  = p(FIRMA.w) + 'px';
  firmaWrap.style.height = p(FIRMA.h) + 'px';

  // Text column
  const textCol = document.createElement('div');
  textCol.className = 'firma-text-col';

  const firmaText = document.createElement('input');
  firmaText.type = 'text';
  firmaText.id = 'field_firma_texto';
  firmaText.placeholder = 'Nombre y N° matrícula';
  firmaText.className = 'firma-text';
  firmaText.autocomplete = 'off';
  firmaText.style.fontSize = p(7.5) + 'px';
  textCol.appendChild(firmaText);

  // Image column
  const imgCol = document.createElement('div');
  imgCol.className = 'firma-img-col';
  imgCol.style.width = p(90) + 'px';
  imgCol.style.height = '100%';
  imgCol.title = 'Clic para subir imagen de firma';

  const imgEl = document.createElement('img');
  imgEl.id = 'firma-preview';
  imgEl.alt = 'Firma';

  const hint = document.createElement('span');
  hint.className = 'upload-hint';
  hint.id = 'firma-hint';
  hint.innerHTML = '📎 Subir<br>firma';

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/png,image/jpeg,image/jpg';
  fileInput.id = 'firma-file-input';
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      firmaImageData = ev.target.result;
      imgEl.src = firmaImageData;
      imgEl.style.display = 'block';
      hint.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  imgCol.appendChild(imgEl);
  imgCol.appendChild(hint);
  imgCol.appendChild(fileInput);

  firmaWrap.appendChild(textCol);
  firmaWrap.appendChild(imgCol);
  overlay.appendChild(firmaWrap);
}

// ---- Download PDF ----
async function downloadPDF() {
  const btn = document.getElementById('btn-download');
  btn.disabled = true;
  btn.textContent = 'Generando...';

  try {
    const bytes = Uint8Array.from(atob(PDF_B64), c => c.charCodeAt(0));
    const pdfDoc = await PDFLib.PDFDocument.load(bytes);
    const page = pdfDoc.getPages()[0];
    const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
    const fontBold = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

    // Text fields
    for (const f of TEXT_FIELDS) {
      const el = document.getElementById('field_' + f.name);
      if (!el || !el.value.trim()) continue;
      page.drawText(el.value.trim(), {
        x: f.x + 2,
        y: PT_H - f.y - f.h + 2,
        size: 8.5,
        font,
        color: PDFLib.rgb(0, 0, 0),
        maxWidth: f.w - 4,
      });
    }

    // Checkboxes — draw "x" centered inside each box
    for (const f of CHECKBOXES) {
      const el = document.getElementById('field_' + f.name);
      if (!el || !el.checked) continue;
      // Center the x inside the 7.4pt box, font size 7
      page.drawText('x', {
        x: f.x + 1.2,
        y: PT_H - f.y - CB_SIZE + 1.0,
        size: 7,
        font: fontBold,
        color: PDFLib.rgb(0.05, 0.05, 0.6),
      });
    }

    // Firma texto
    const firmaTextoEl = document.getElementById('field_firma_texto');
    if (firmaTextoEl && firmaTextoEl.value.trim()) {
      page.drawText(firmaTextoEl.value.trim(), {
        x: FIRMA.x + 2,
        y: PT_H - FIRMA.y - 12,
        size: 8.5,
        font,
        color: PDFLib.rgb(0, 0, 0),
        maxWidth: FIRMA.w - 100,
      });
    }

    // Firma imagen — placed to the right of text, larger area
    if (firmaImageData) {
      const isJpeg = firmaImageData.startsWith('data:image/jpeg') || firmaImageData.startsWith('data:image/jpg');
      const base64 = firmaImageData.split(',')[1];
      const imgBytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
      const embeddedImg = isJpeg ? await pdfDoc.embedJpg(imgBytes) : await pdfDoc.embedPng(imgBytes);

      // Image zone: right side of firma area, 90pt wide, 30pt tall
      const imgZoneX = FIRMA.x + FIRMA.w - 94;
      const imgZoneY = PT_H - FIRMA.y - FIRMA.h;
      const imgZoneW = 90;
      const imgZoneH = FIRMA.h - 2;

      const dims = embeddedImg.scale(1);
      const scale = Math.min(imgZoneW / dims.width, imgZoneH / dims.height);
      const drawW = dims.width * scale;
      const drawH = dims.height * scale;

      page.drawImage(embeddedImg, {
        x: imgZoneX + (imgZoneW - drawW) / 2,
        y: imgZoneY + (imgZoneH - drawH) / 2,
        width: drawW,
        height: drawH,
      });
    }

    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'formulario_psicoterapia_completado.pdf';
    a.click();

  } catch(e) {
    alert('Error al generar el PDF: ' + e.message);
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '⬇ Descargar PDF';
}

document.getElementById('btn-clear').addEventListener('click', () => {
  document.querySelectorAll('#fields-overlay input[type="text"]').forEach(el => el.value = '');
  document.querySelectorAll('#fields-overlay input[type="checkbox"]').forEach(el => {
    el.checked = false;
    el.dispatchEvent(new Event('change'));
  });
  firmaImageData = null;
  const img = document.getElementById('firma-preview');
  if (img) { img.src = ''; img.style.display = 'none'; }
  const hint = document.getElementById('firma-hint');
  if (hint) hint.style.display = '';
  const fi = document.getElementById('firma-file-input');
  if (fi) fi.value = '';
});

document.getElementById('btn-download').addEventListener('click', downloadPDF);
renderPDF().catch(e => {
  document.getElementById('loading').textContent = 'Error cargando el formulario.';
  console.error(e);
});
